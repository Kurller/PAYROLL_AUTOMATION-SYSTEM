version: '3.9'

services:

  web:
    build: .

    command: >
      sh -c "
      python manage.py migrate &&
      gunicorn payroll_system.wsgi:application --bind 0.0.0.0:8000
      "

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: